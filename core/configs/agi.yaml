# ==========================================
# TITANCORE AGI CONFIGURATION v2
# ==========================================

agi:
  enabled: true
  version: "2.0.0"

# -----------------------------------------------
# Continuous Learning (Online Gradient Descent)
# -----------------------------------------------
online_learning:
  enabled: true
  learning_rate: 1.0e-5
  replay_buffer_capacity: 100000
  replay_batch_size: 32
  update_every_n_samples: 16
  grad_clip: 1.0
  ema_decay: 0.999

  ewc:
    enabled: true
    lambda: 5000.0
    fisher_samples: 200

# -----------------------------------------------
# Learning from Experience (RLHF + PPO + HER)
# -----------------------------------------------
experience_learning:
  enabled: true
  reward_model:
    learning_rate: 1.0e-4
    preference_loss: bradley_terry
  ppo:
    enabled: true
    learning_rate: 3.0e-5
    clip_epsilon: 0.2
    value_coef: 0.5
    entropy_coef: 0.01
    epochs_per_update: 4
    gae_lambda: 0.95
    discount_gamma: 0.99
  her:
    enabled: true
    buffer_capacity: 200000
    use_hindsight: true
  curiosity:
    enabled: true
    intrinsic_weight: 0.1
    normalise: true

# -----------------------------------------------
# Memory Systems
# -----------------------------------------------
memory:
  episodic:
    enabled: true
    capacity: 50000
    temporal_half_life_hours: 24
    embedding_dim: 512
  semantic:
    enabled: true
    min_confidence: 0.3
    conflict_resolution: newer_wins
  working:
    enabled: true
    token_budget: 8192
    importance_ema: 0.9

# -----------------------------------------------
# Reasoning Engine
# -----------------------------------------------
reasoning:
  chain_of_thought:
    default_mode: reflection        # standard | self_consistency | tree_of_thought | reflection
    max_steps: 8
    min_confidence: 0.4
    self_consistency_samples: 5
    tot_breadth: 3
    tot_depth: 4

  logic_engine:
    enabled: true
    modes: [deductive, inductive, abductive, analogical]
    rule_base_size: 10              # built-in seed rules
    induction_min_observations: 3

  common_sense:
    enabled: true
    knowledge_base: built_in        # extend with custom triples at runtime
    physical_intuition: true
    theory_of_mind: true
    default_reasoning: true
    analogical_inference: true

# -----------------------------------------------
# Planning
# -----------------------------------------------
planning:
  mcts:
    enabled: true
    iterations: 500
    max_depth: 10
    exploration_c: 1.414
    goal_threshold: 0.85

  htn:
    enabled: true
    max_decomposition_depth: 12
    max_iterations: 10000
    parallel_steps: true            # allow sibling tasks to run concurrently
    replan_on_failure: true

# -----------------------------------------------
# Meta-Learning
# -----------------------------------------------
meta_learning:
  enabled: true
  algorithm: reptile               # maml | reptile
  inner_lr: 0.01
  outer_lr: 1.0e-3
  inner_steps: 5
  meta_batch_size: 8
  first_order: true

# -----------------------------------------------
# World Model
# -----------------------------------------------
world_model:
  enabled: true
  latent_dim: 512
  action_dim: 256
  learning_rate: 1.0e-4
  novelty_threshold: 2.5
  novelty_buffer_size: 1000
  imagination_steps: 10            # steps to simulate ahead for planning

# -----------------------------------------------
# Tool Use
# -----------------------------------------------
tools:
  enabled: true
  max_retries: 2
  timeout_ms: 5000
  builtin:
    - calculator
    - web_search
    - code_interpreter
    - read_file
    - db_query

# -----------------------------------------------
# General Intelligence
# -----------------------------------------------
general_intelligence:
  transfer_learning:
    enabled: true
    min_domain_similarity: 0.3     # below this, transfer is not attempted

  curriculum_learning:
    enabled: true
    starting_difficulty: 0.10
    difficulty_step: 0.05
    mastery_threshold: 0.85

  self_improvement:
    enabled: true
    assessment_interval: 100       # steps between self-assessments
    gap_severity_threshold: 0.7    # gaps above this severity are flagged

  skill_composition:
    enabled: true
    max_composed_skills: 50

  generalisation_test:
    enabled: true
    min_novel_domains: 3
    test_interval_steps: 1000

  metacognition:
    enabled: true
    confidence_threshold: 0.3      # below this, add uncertainty note to response
    known_unknowns_tracking: true

# -----------------------------------------------
# Intrinsic Motivation
# -----------------------------------------------
intrinsic_motivation:
  enabled: true
  curiosity_weight: 0.1
  novelty_bonus: true

# -----------------------------------------------
# Cognitive Loop
# -----------------------------------------------
cognitive_loop:
  introspection_interval: 100
  goal_check_interval: 500
  memory_consolidation_interval: 10000
  common_sense_gate: true          # reject implausible inputs before reasoning
  metacognitive_notes: true        # append confidence notes to responses
